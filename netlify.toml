[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # These are non-secret public vars that Netlify's secret scanner would otherwise flag
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET,NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_RAZORPAY_KEY_ID,NEXTAUTH_URL,AI_PROVIDER,ANTHROPIC_MODEL,OLLAMA_MODEL,OLLAMA_BASE_URL,RESEND_FROM_EMAIL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
